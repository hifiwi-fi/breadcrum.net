# Basic dependabot.yml file with
# minimum configuration for two package managers

version: 2
updates:
  # Root
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"

  - package-ecosystem: "npm"
    directory: "/" # Covers all workspaces
    open-pull-requests-limit: 20
    schedule:
      interval: "cron"
      cron: "0 0 * * *"
    groups:
      opentelemetry:
        patterns:
          - "@opentelemetry/*"
          - "@fastify/otel"
      typescript:
        patterns:
          - "@voxpelli/tsconfig"
          - "@types/node"
          - "typescript"
      eslint:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@eslint/*"

  # Worker
  - package-ecosystem: "docker"
    directory: "/packages/worker"
    schedule:
      interval: "daily"

  # Server
  - package-ecosystem: "docker"
    directory: "/packages/web"
    schedule:
      interval: "daily"
